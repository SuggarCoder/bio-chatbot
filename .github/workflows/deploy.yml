name: Deploy AI Chatbot

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ai-chatbot-production
  cancel-in-progress: false

jobs:
  deploy:
    name: TEST
    runs-on:
      - self-hosted
      - linux
      - x64

    timeout-minutes: 45

    steps:
      - name: Configure Git
        shell: bash
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.maxRequests 1

      - name: Checkout repository - attempt 1
        id: checkout_1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Clean failed checkout 1
        if: steps.checkout_1.outcome == 'failure'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE" \
            -mindepth 1 \
            -maxdepth 1 \
            -exec rm -rf -- {} +

          sleep 15

      - name: Checkout repository - attempt 2
        id: checkout_2
        if: steps.checkout_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Clean failed checkout 2
        if: >
          steps.checkout_1.outcome == 'failure' &&
          steps.checkout_2.outcome == 'failure'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE" \
            -mindepth 1 \
            -maxdepth 1 \
            -exec rm -rf -- {} +

          sleep 30

      - name: Checkout repository - attempt 3
        id: checkout_3
        if: >
          steps.checkout_1.outcome == 'failure' &&
          steps.checkout_2.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Verify checkout
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ ! -f package.json ]; then
            echo "All checkout attempts failed"
            exit 1
          fi

          echo "Successfully checked out commit:"
          git rev-parse HEAD || true

      - name: Build and deploy
        env:
          APP_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -Eeuo pipefail

          docker compose \
            -p ai-chatbot \
            up \
            -d \
            --build \
            --remove-orphans

      - name: Verify application
        shell: bash
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            echo "Health check ${attempt}/30"

            if curl \
              --fail \
              --silent \
              --show-error \
              http://10.88.20.19:8090/ai-chatbot/api/health
            then
              echo
              echo "Deployment succeeded"
              exit 0
            fi

            sleep 2
          done

          docker compose -p ai-chatbot ps
          docker compose -p ai-chatbot logs --tail=200

          exit 1